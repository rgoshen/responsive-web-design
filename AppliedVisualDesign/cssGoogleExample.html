<style>
  h4 {
    text-align: center;
    /* height: 25px; */
    padding: 10px;
    background-color: rgba(45, 45, 45, 0.1);
    font-size: 27px;
    text-transform: uppercase;
  }
  p {
    text-align: justify;
    font-size: 16px;
    line-height: 25px;
  }
  .links {
    margin-right: 20px;
    text-align: left;
    opacity: 0.7;
  }
  #thumbnail {
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.19), 0 6px 6px rgba(0, 0, 0, 0.23);
  }

  .fullCard {
    border: 1px solid #ccc;
    border-radius: 5px;
    margin: 10px 5px;
    padding: 4px;
    width: 245px;
  }
  .cardContent {
    padding: 10px;
  }
</style>

<html>
  <body>
    <div class="fullCard" id="thumbnail">
      <div class="cardContent">
        <div class="cardText">
          <h4>Alphabet</h4>
          <hr />
          <p>
            <em>
              Google was founded by Larry Page and Sergey Brin while they were
              <u>Ph.D. students</u>> at <strong>Stanford University</strong>.
            </em>
          </p>
        </div>
        <div class="cardLinks">
          <a
            href="https://en.wikipedia.org/wiki/Larry_Page"
            target="_blank"
            class="links"
            >Larry Page</a
          >
          <a
            href="https://en.wikipedia.org/wiki/Sergey_Brin"
            target="_blank"
            class="links"
            >Sergey Brin</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
